<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoMart - Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #0b1220;
      overflow: hidden;
    }

    .page-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .image-side {
      flex: 1.4;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 60px;
      background-image: url('locking in/ecom1.png');
      background-size: cover;
      background-position: center;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, rgba(11, 18, 32, 0.9), transparent);
    }

    .brand-text {
      position: relative;
      color: white;
      z-index: 1;
    }

    .brand-text h2 {
      font-size: 3rem;
      margin: 0;
    }

    .form-side {
      flex: 1;
      background-color: #0b1220;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      color: white;
      position: relative;
    }

    .login-box {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .neomart-logo {
      font-size: 2.5rem;
      margin: 0;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .neomart-logo span {
      color: #c2a366;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 8px;
      color: #cbd5e1;
      padding-left: 15px;
    }

    input {
      width: 100%;
      padding: 16px 25px;
      border-radius: 50px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      font-size: 16px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #c2a366;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      border: none;
      background-color: #c2a366;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer-links {
      margin-top: 25px;
      font-size: 0.9rem;
    }

    .footer-links a {
      color: #c2a366;
      text-decoration: none;
    }

    .divider {
      margin: 0 10px;
      color: #334155;
    }

    .copyright {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      color: #475569;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .image-side {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="page-container">
    <div class="image-side">
      <div class="overlay"></div>
      <div class="brand-text">
        <h2>NeoMart</h2>
        <p>Your gateway to premium shopping.</p>
      </div>
    </div>

    <div class="form-side">
      <div class="login-box">
        <div class="logo-area">
          <h1 class="neomart-logo">Neo<span>Mart</span></h1>
          <p class="subtitle">Welcome back! Please login to your account.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="input-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="name@example.com" required>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••" required>
          </div>

          <button type="submit" id="signInBtn">Sign In</button>
        </form>

        <div class="footer-links">
          <a href="#">Forgot password?</a>
          <span class="divider">|</span>
          <a href="register.html">Create an account</a>
        </div>
      </div>

      <div class="copyright">
        &copy; 2026 NeoMart. All rights reserved.
      </div>
    </div>
  </div>

  <script>
    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signInBtn');

      btn.innerText = "Checking...";
      btn.disabled = true;

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          // --- THE CRITICAL UPDATE ---
          // Save the name so the Shop page knows who you are!
          localStorage.setItem('neoMartUser', data.name);

          alert(data.message);
          window.location.href = data.redirect;
        } else {
          alert(data.message);
          btn.innerText = "Sign In";
          btn.disabled = false;
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Server is offline. Make sure to run 'node server.js' in VS Code!");
        btn.innerText = "Sign In";
        btn.disabled = false;
      }
    }
  </script>

</body>

</html>
